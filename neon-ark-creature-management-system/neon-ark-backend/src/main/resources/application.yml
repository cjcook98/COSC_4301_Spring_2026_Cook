spring:
  application:
    name: neon-ark-creature-system

  datasource:
    url: jdbc:postgresql://localhost:5436/neonark_creatures
    driver-class-name: org.postgresql.Driver
    username: neonark
    password: neonarkpass

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
